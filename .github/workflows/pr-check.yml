name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Unit tests
        run: npm run test -w frontend

      - name: Property-based tests
        run: npm run test -w frontend -- --testPathPattern="property|pbt"

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w backend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Unit tests
        run: npm run test -w backend

      - name: Property-based tests
        run: npm run test -w backend -- --testPathPattern="property|pbt"
